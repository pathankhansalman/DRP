name: DRP Validate

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: pip install .
      - name: Validate examples (blocking)
        run: drp-validate validate examples/*.json
      - name: Lint examples (non-blocking)
        run: drp-validate lint examples/*.json || true

name: DRP Validate

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package
        run: pip install .

      - name: Validate examples
        run: drp-validate examples/*.json

      - name: Lint examples (non-blocking)
        run: drp-validate --lint examples/*.json || true
